<script>

const supabaseUrl="https://xnotnspzbvicownuaqxg.supabase.co";
const supabaseKey="sb_publishable_4T7OO9hz6K-eef2JNXRKuA_IAmsbj1a";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

// Códigos de acceso por rol
const codigosProfesor = ["1234", "5678"];
const codigosAsesor = ["9999", "0000"];
const codigosPadres = ["1111", "2222", "3333", "4444", "5555", "6666", "7777", "8888"];

let rolUsuario = null; // 'profesor', 'asesor' o 'padre'
let rolSeleccionado = null; // rol seleccionado en login
let estudianteAsignado = null; // para padres
let estudiantes=[];
let asistencia={};
let cursoActual=null;

function seleccionarRol(rol){
rolSeleccionado = rol;
document.querySelectorAll('.rol-btn').forEach(btn => btn.classList.remove('seleccionado'));
event.target.closest('.rol-btn').classList.add('seleccionado');
document.getElementById("login-error").textContent = "";
}

function verificarAcceso(){
const codigo = document.getElementById("codigo-acceso").value;
const errorMsg = document.getElementById("login-error");

if(!rolSeleccionado){
errorMsg.textContent = "❌ Por favor selecciona un rol";
return;
}

if(!codigo){
errorMsg.textContent = "❌ Por favor ingresa el código";
return;
}

// Verificar que el código corresponda al rol seleccionado
if(rolSeleccionado === 'profesor' && codigosProfesor.includes(codigo)){
rolUsuario = 'profesor';
document.getElementById("login-container").style.display = "none";
document.getElementById("app-container").style.display = "block";
document.getElementById("rol-usuario").textContent = "Profesor";
// Mostrar botón de modo tema para profesores
document.getElementById("btn-modo-tema").style.display = "inline-block";
// Mostrar botón de Drive para profesores
document.getElementById("btn-drive").style.display = "inline-block";
cargar();
} else if(rolSeleccionado === 'asesor' && codigosAsesor.includes(codigo)){
rolUsuario = 'asesor';
document.getElementById("login-container").style.display = "none";
document.getElementById("app-container").style.display = "block";
document.getElementById("rol-usuario").textContent = "Asesor (Solo lectura)";
// Mostrar botón de Drive para asesores
document.getElementById("btn-drive").style.display = "inline-block";
aplicarRestriccionesAsesor();
cargar();
} else if(rolSeleccionado === 'padre' && codigosPadres.includes(codigo)){
rolUsuario = 'padre';
// Mostrar selector de estudiante
mostrarSelectorEstudiante();
} else {
errorMsg.textContent = "❌ Código incorrecto para el rol seleccionado";
document.getElementById("codigo-acceso").value = "";
document.getElementById("codigo-acceso").focus();
}
}

async function mostrarSelectorEstudiante(){
// Cargar estudiantes primero
const {data} = await supabaseClient.from("estudiantes").select("*").order("nombre");
estudiantes = data;

// Mostrar modal para ingresar nombre del estudiante
let html = `
<div style="background:white;padding:20px;border-radius:10px;max-width:90%;width:400px;margin:20px auto;">
<h2 style="font-size:20px;margin-bottom:15px;">Acceso para Padres</h2>
<p style="margin-bottom:15px;">Ingresa el nombre completo del estudiante:</p>
<input type="text" id="buscar-estudiante" placeholder="Nombre del estudiante..." style="width:100%;padding:12px;font-size:16px;border:2px solid #ddd;border-radius:8px;margin-bottom:15px;box-sizing:border-box;" autofocus>
<div id="sugerencias-estudiantes" style="max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:8px;padding:10px;display:none;margin-bottom:15px;background:#f9f9f9;">
</div>
<button onclick="buscarEstudiante()" style="width:100%;padding:12px;background:#673ab7;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;touch-action:manipulation;">Ingresar</button>
<p id="error-busqueda" style="color:#f44336;margin-top:10px;text-align:center;font-size:14px;"></p>
</div>
`;

document.getElementById("login-container").innerHTML = html;

// Agregar funcionalidad de búsqueda con sugerencias
document.getElementById("buscar-estudiante").addEventListener('input', function(e){
const busqueda = e.target.value.toLowerCase().trim();
const sugerenciasDiv = document.getElementById("sugerencias-estudiantes");

if(busqueda.length < 2){
sugerenciasDiv.style.display = "none";
return;
}

const filtrados = estudiantes.filter(est => est.nombre.toLowerCase().includes(busqueda));

if(filtrados.length > 0){
sugerenciasDiv.style.display = "block";
sugerenciasDiv.innerHTML = "";
filtrados.slice(0, 5).forEach(est => {
const div = document.createElement('div');
div.style.padding = "10px";
div.style.cursor = "pointer";
div.style.borderBottom = "1px solid #ddd";
div.style.transition = "background 0.2s";
div.innerHTML = `<strong>${est.nombre}</strong> <span style="color:#999;">(Curso ${est.curso})</span>`;
div.addEventListener('mouseover', function(){ this.style.background = '#e3f2fd'; });
div.addEventListener('mouseout', function(){ this.style.background = 'transparent'; });
div.addEventListener('click', function(){ seleccionarEstudiante(est.id, est.nombre, est.curso); });
sugerenciasDiv.appendChild(div);
});
} else {
sugerenciasDiv.style.display = "none";
}
});

// Permitir enter para buscar
document.getElementById("buscar-estudiante").addEventListener('keypress', function(e){
if(e.key === 'Enter'){
buscarEstudiante();
}
});
}

function buscarEstudiante(){
const nombreBuscado = document.getElementById("buscar-estudiante").value.trim().toLowerCase();
const errorDiv = document.getElementById("error-busqueda");

if(!nombreBuscado){
errorDiv.textContent = "Por favor ingresa un nombre";
return;
}

const estudianteEncontrado = estudiantes.find(est => 
est.nombre.toLowerCase() === nombreBuscado
);

if(estudianteEncontrado){
seleccionarEstudiante(estudianteEncontrado.id, estudianteEncontrado.nombre, estudianteEncontrado.curso);
} else {
errorDiv.textContent = "Estudiante no encontrado. Verifica el nombre completo.";
}
}

estudianteAsignado = {id, nombre, curso};
document.getElementById("login-container").style.display = "none";
document.getElementById("app-container").style.display = "block";
document.getElementById("rol-usuario").textContent = `Padre/Madre - ${nombre}`;
aplicarRestriccionesPadre();
mostrarVistaPadre();
}

function marcar(id,estado){

if(rolUsuario === 'asesor'){
alert("No tienes permisos para marcar asistencia");
return;
}

asistencia[id]=estado;

const botones=document.querySelectorAll(`#botones-${id} button`);
botones.forEach(btn=>btn.classList.remove('activo'));

const botonActivo=document.querySelector(`#botones-${id} .${estado}`);
botonActivo.classList.add('activo');

}

async function guardar(){

if(rolUsuario === 'asesor'){
alert("No tienes permisos para guardar asistencia");
return;
}

let fecha=document.getElementById("fecha").value;

if(!fecha){
alert("Por favor selecciona una fecha");
return;
}

if(!cursoActual){
alert("Por favor selecciona un curso");
return;
}

let estudiantesAGuardar = [];

for(let id in asistencia){
let estudiante = estudiantes.find(est => est.id == id);
if(estudiante.curso === cursoActual){
estudiantesAGuardar.push(id);
}
}

if(estudiantesAGuardar.length === 0){
alert("No hay asistencia marcada para guardar");
return;
}

// Verificar si ya existe asistencia para esta fecha y estos estudiantes
const {data: registrosExistentes} = await supabaseClient
.from("asistencia")
.select("estudiante_id")
.eq("fecha", fecha)
.in("estudiante_id", estudiantesAGuardar);

if(registrosExistentes && registrosExistentes.length > 0){
alert(`Fecha registrada: Ya existe asistencia para la fecha ${fecha}. No se puede registrar dos veces.`);
return;
}

for(let id of estudiantesAGuardar){
await supabaseClient
.from("asistencia")
.insert({
estudiante_id:id,
fecha:fecha,
estado:asistencia[id]
});
}

alert(`Asistencia guardada para ${estudiantesAGuardar.length} estudiante(s)`);

asistencia = {};
document.querySelectorAll('.botones button').forEach(btn => btn.classList.remove('activo'));

}

async function verHistorial(id, nombre){

const {data} = await supabaseClient
.from("asistencia")
.select("*")
.eq("estudiante_id", id)
.order("fecha", {ascending: false});

window.historialActual = {nombre: nombre, data: data};

document.getElementById("modal-titulo").textContent = `Historial de ${nombre}`;

const historialDiv = document.getElementById("modal-historial");
historialDiv.innerHTML = "";

if(data.length === 0){
historialDiv.innerHTML = "<p>No hay registros de asistencia</p>";
} else {
data.forEach(registro => {
let colorEstado = "";
if(registro.estado === "P") colorEstado = "#34a853";
if(registro.estado === "A") colorEstado = "#fbbc05";
if(registro.estado === "L") colorEstado = "#4285f4";
if(registro.estado === "F") colorEstado = "#ea4335";

historialDiv.innerHTML += `
<div class="historial-item">
<span>${registro.fecha}</span>
<span class="estado-badge" style="background:${colorEstado}">${registro.estado}</span>
</div>
`;
});
}

document.getElementById("modal").style.display = "block";

}

function descargarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const {nombre, data} = window.historialActual;

doc.setFontSize(18);
doc.text(`Historial de Asistencia`, 20, 20);
doc.setFontSize(14);
doc.text(`Estudiante: ${nombre}`, 20, 30);

doc.setFontSize(12);
let y = 45;

if(data.length === 0){
doc.text("No hay registros de asistencia", 20, y);
} else {
doc.text("Fecha", 20, y);
doc.text("Estado", 80, y);
y += 10;

data.forEach(registro => {
let estadoTexto = "";
if(registro.estado === "P") estadoTexto = "Presente";
if(registro.estado === "A") estadoTexto = "Atraso";
if(registro.estado === "L") estadoTexto = "Licencia";
if(registro.estado === "F") estadoTexto = "Falta";

doc.text(registro.fecha, 20, y);
doc.text(estadoTexto, 80, y);

if(y > 280){
doc.addPage();

}
});
}

doc.save(`Historial_${nombre}.pdf`);

}

async function generarInforme(){

const fecha = document.getElementById("informe-fecha").value;
const cursosSeleccionados = Array.from(document.querySelectorAll('.curso-checkbox:checked')).map(cb => cb.value);

if(!fecha){
alert("Por favor selecciona una fecha");
return;
}

if(cursosSeleccionados.length === 0){
alert("Por favor selecciona al menos un curso");
return;
}

// Obtener asistencia de la fecha
const {data: asistenciaData} = await supabaseClient
.from("asistencia")
.select("*, estudiantes(*)")
.eq("fecha", fecha);

if(!asistenciaData || asistenciaData.length === 0){
document.getElementById("informe-contenido").innerHTML = "<p>No hay registros de asistencia para esta fecha</p>";
return;
}

// Filtrar por cursos seleccionados
let asistenciaFiltrada = asistenciaData.filter(a => cursosSeleccionados.includes(a.estudiantes.curso));

if(asistenciaFiltrada.length === 0){
document.getElementById("informe-contenido").innerHTML = "<p>No hay registros para los cursos seleccionados en esta fecha</p>";
return;
}

// Separar por estado
let presentes = asistenciaFiltrada.filter(a => a.estado === 'P');
let atrasos = asistenciaFiltrada.filter(a => a.estado === 'A');
let licencias = asistenciaFiltrada.filter(a => a.estado === 'L');
let faltas = asistenciaFiltrada.filter(a => a.estado === 'F');

const cursosTexto = cursosSeleccionados.length === 6 ? 'Todos los cursos' : 'Cursos: ' + cursosSeleccionados.join(', ');

// Formatear fecha a dd/mm/yyyy
const [year, month, day] = fecha.split('-');
const fechaFormateada = `${day}/${month}/${year}`;

// Generar HTML del informe
let html = `
<div class="resumen-informe">
<h3>Resumen del ${fechaFormateada} - ${cursosTexto}</h3>
<p><strong>Total estudiantes:</strong> ${asistenciaFiltrada.length}</p>
<p><strong>Presentes:</strong> ${presentes.length} | <strong>Atrasos:</strong> ${atrasos.length} | <strong>Licencias:</strong> ${licencias.length} | <strong>Faltas:</strong> ${faltas.length}</p>
</div>

<h3>Estudiantes con Atraso (A)</h3>
<table class="tabla-informe">
<thead>
<tr>
<th>Nombre</th>
<th>Curso</th>
<th>Estado</th>
</tr>
</thead>
<tbody>
`;

if(atrasos.length === 0){
html += '<tr><td colspan="3">No hay estudiantes con atraso</td></tr>';
} else {
atrasos.forEach(a => {
html += `<tr><td>${a.estudiantes.nombre}</td><td>${a.estudiantes.curso}</td><td style="background:#fbbc05;color:white;font-weight:bold;">A</td></tr>`;
});
}

html += `</tbody></table>

<h3>Estudiantes con Falta (F)</h3>
<table class="tabla-informe">
<thead>
<tr>
<th>Nombre</th>
<th>Curso</th>
<th>Estado</th>
</tr>
</thead>
<tbody>
`;

if(faltas.length === 0){
html += '<tr><td colspan="3">No hay estudiantes con falta</td></tr>';
} else {
faltas.forEach(a => {
html += `<tr><td>${a.estudiantes.nombre}</td><td>${a.estudiantes.curso}</td><td style="background:#ea4335;color:white;font-weight:bold;">F</td></tr>`;
});
}

html += `</tbody></table>

<h3>Estudiantes con Licencia (L)</h3>
<table class="tabla-informe">
<thead>
<tr>
<th>Nombre</th>
<th>Curso</th>
<th>Estado</th>
</tr>
</thead>
<tbody>
`;

if(licencias.length === 0){
html += '<tr><td colspan="3">No hay estudiantes con licencia</td></tr>';
} else {
licencias.forEach(a => {
html += `<tr><td>${a.estudiantes.nombre}</td><td>${a.estudiantes.curso}</td><td style="background:#4285f4;color:white;font-weight:bold;">L</td></tr>`;
});
}

html += '</tbody></table>';

document.getElementById("informe-contenido").innerHTML = html;

window.informeActual = {fecha, fechaFormateada, cursosSeleccionados, cursosTexto, asistenciaFiltrada, atrasos, faltas, licencias, presentes};

}

async function exportarInforme(){

if(!window.informeActual){
alert("Primero genera un informe");
return;
}

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const {fecha, fechaFormateada, cursosTexto, asistenciaFiltrada, atrasos, faltas, licencias, presentes} = window.informeActual;

doc.setFontSize(16);
doc.text("Informe Diario de Asistencia - SEXTO", 20, 20);
doc.setFontSize(12);
doc.text(`Fecha: ${fechaFormateada}`, 20, 30);
doc.text(`${cursosTexto}`, 20, 37);

doc.setFontSize(11);
doc.text(`Total: ${asistenciaFiltrada.length} | Presentes: ${presentes.length} | Atrasos: ${atrasos.length} | Licencias: ${licencias.length} | Faltas: ${faltas.length}`, 20, 47);

let y = 60;

// Atrasos
doc.setFontSize(13);
doc.text("Estudiantes con Atraso (A)", 20, y);
y += 7;

async function generarInformeMensual(){

const fechaInicio = document.getElementById("mensual-inicio").value;
const fechaFin = document.getElementById("mensual-fin").value;
const curso = document.getElementById("mensual-curso").value;

if(!fechaInicio || !fechaFin){
alert("Por favor selecciona las fechas de inicio y fin");
return;
}

if(!curso){
alert("Por favor selecciona un curso");
return;
}

// Obtener estudiantes del curso
const {data: estudiantesCurso} = await supabaseClient
.from("estudiantes")
.select("*")
.eq("curso", curso)
.order("nombre");

if(!estudiantesCurso || estudiantesCurso.length === 0){
document.getElementById("mensual-contenido").innerHTML = "<p>No hay estudiantes en este curso</p>";
return;
}

// Obtener asistencia del periodo
const {data: asistenciaData} = await supabaseClient
.from("asistencia")
.select("*")
.gte("fecha", fechaInicio)
.lte("fecha", fechaFin)
.in("estudiante_id", estudiantesCurso.map(e => e.id))
.order("fecha");

// Obtener fechas únicas ordenadas
let fechasUnicas = [...new Set(asistenciaData.map(a => a.fecha))].sort();

// Crear matriz de asistencia por estudiante y fecha
let matrizAsistencia = {};
estudiantesCurso.forEach(est => {
matrizAsistencia[est.id] = {
nombre: est.nombre,
fechas: {}
};
fechasUnicas.forEach(fecha => {
let registro = asistenciaData.find(a => a.estudiante_id === est.id && a.fecha === fecha);
matrizAsistencia[est.id].fechas[fecha] = registro ? registro.estado : '-';
});
});

// Procesar datos por estudiante para resumen
let datosEstudiantes = [];

estudiantesCurso.forEach(estudiante => {
let registros = asistenciaData.filter(a => a.estudiante_id === estudiante.id);
let presentes = registros.filter(r => r.estado === 'P').length;
let atrasos = registros.filter(r => r.estado === 'A').length;
let licencias = registros.filter(r => r.estado === 'L').length;
let faltas = registros.filter(r => r.estado === 'F').length;
let total = registros.length;

datosEstudiantes.push({
id: estudiante.id,
nombre: estudiante.nombre,
presentes,
atrasos,
licencias,
faltas,
total,
porcentajeAsistencia: total > 0 ? ((presentes / total) * 100).toFixed(1) : 0
});
});

// Generar HTML con tabla detallada
let html = `
<div class="resumen-informe">
<h3>Informe Mensual - Curso ${curso}</h3>
<p><strong>Periodo:</strong> ${fechaInicio} al ${fechaFin}</p>
<p><strong>Total estudiantes:</strong> ${estudiantesCurso.length} | <strong>Fechas registradas:</strong> ${fechasUnicas.length}</p>
</div>

<h3>Historial Detallado por Fecha</h3>
<div style="overflow-x:auto;">
<table class="tabla-informe">
<thead>
<tr>
<th style="position:sticky;left:0;background:#673ab7;z-index:10;">Estudiante</th>
`;

// Agregar columnas de fechas
fechasUnicas.forEach(fecha => {
html += `<th style="min-width:60px;">${fecha}</th>`;
});

html += `
</tr>
</thead>
<tbody>
`;

// Agregar filas de estudiantes con sus asistencias por fecha
estudiantesCurso.forEach(est => {
html += `<tr><td style="position:sticky;left:0;background:white;font-weight:bold;z-index:5;">${est.nombre}</td>`;
fechasUnicas.forEach(fecha => {
let estado = matrizAsistencia[est.id].fechas[fecha];
let colorFondo = '';
let colorTexto = 'black';
if(estado === 'P') { colorFondo = '#e8f5e9'; colorTexto = '#2e7d32'; }
else if(estado === 'A') { colorFondo = '#fff3e0'; colorTexto = '#e65100'; }
else if(estado === 'L') { colorFondo = '#e3f2fd'; colorTexto = '#1565c0'; }
else if(estado === 'F') { colorFondo = '#ffebee'; colorTexto = '#c62828'; }
else { colorFondo = '#f5f5f5'; colorTexto = '#999'; }
html += `<td style="background:${colorFondo};color:${colorTexto};font-weight:bold;text-align:center;">${estado}</td>`;
});
html += `</tr>`;
});

html += `
</tbody>
</table>
</div>

<h3 style="margin-top:30px;">Resumen de Asistencia</h3>
<table class="tabla-informe">
<thead>
<tr>
<th>Estudiante</th>
<th>Presentes (P)</th>
<th>Atrasos (A)</th>
<th>Licencias (L)</th>
<th>Faltas (F)</th>
<th>Total Días</th>
<th>% Asistencia</th>
</tr>
</thead>
<tbody>
`;

datosEstudiantes.forEach(est => {
let colorAsistencia = est.porcentajeAsistencia >= 80 ? '#4caf50' : est.porcentajeAsistencia >= 60 ? '#ff9800' : '#f44336';
html += `
<tr>
<td><strong>${est.nombre}</strong></td>
<td style="background:#e8f5e9;">${est.presentes}</td>
<td style="background:#fff3e0;">${est.atrasos}</td>
<td style="background:#e3f2fd;">${est.licencias}</td>
<td style="background:#ffebee;">${est.faltas}</td>
<td>${est.total}</td>
<td style="background:${colorAsistencia};color:white;font-weight:bold;">${est.porcentajeAsistencia}%</td>
</tr>
`;
});

html += '</tbody></table>';

document.getElementById("mensual-contenido").innerHTML = html;

window.mensualActual = {fechaInicio, fechaFin, curso, datosEstudiantes, fechasUnicas, matrizAsistencia, estudiantesCurso};

}

function exportarMensualExcel(){

const encabezados = ["Nombre", "Curso"];
fechasUnicas.forEach(fecha => {

});

// Recorrer cada estudiante
estudiantesCurso.forEach(est => {

// Agregar el criterio de cada fecha
fechasUnicas.forEach(fecha => {
let criterio = matrizAsistencia[est.id].fechas[fecha];
fila.push(criterio);
});
excelData.push(fila);
});

// Crear hoja de trabajo
const ws = XLSX.utils.aoa_to_sheet(excelData);

// Ajustar ancho de columnas
const colWidths = [
{wch: 40}, // Nombre
{wch: 10}  // Curso
];
// Agregar ancho para cada fecha
fechasUnicas.forEach(() => {

});
ws['!cols'] = colWidths;

.eq("id", id);

if(error){
alert("Error al modificar el estudiante: " + error.message);
console.error(error);
} else {
alert("Estudiante modificado exitosamente");
// Recargar estudiantes
await cargar();
cerrarFormularioEstudiante();
mostrarEstudiantes();
}
}

function mostrarFormEliminarEstudiante(){
if(rolUsuario !== 'profesor'){
alert("Solo los profesores pueden eliminar estudiantes");
return;
}

const estudiantesCurso = estudiantes.filter(est => est.curso === cursoActual).sort((a, b) => a.nombre.localeCompare(b.nombre));

let html = `
<div class="form-estudiante">
<h3>🗑️ Eliminar Estudiante</h3>
<p style="color:#f44336;font-weight:bold;">⚠️ ADVERTENCIA: Esta acción no se puede deshacer</p>
<p>Selecciona un estudiante para eliminar:</p>
<div class="lista-estudiantes-modificar">
`;

estudiantesCurso.forEach(est => {
html += `
<div class="item-estudiante-modificar" onclick="confirmarEliminarEstudiante(${est.id}, '${est.nombre.replace(/'/g, "\\'")}')">
<span><strong>${est.nombre}</strong> - Curso ${est.curso}</span>
<span>🗑️</span>
</div>
`;
});

html += `
</div>
<button class="btn-cancelar" onclick="cerrarFormularioEstudiante()">❌ Cancelar</button>
</div>
`;

const contenedor = document.getElementById("contenedor-formulario-estudiante");
contenedor.innerHTML = html;
}

async function confirmarEliminarEstudiante(id, nombre){
const confirmacion = confirm(`¿Estás seguro de que deseas eliminar a ${nombre}?\n\nEsta acción eliminará también todos sus registros de asistencia y no se puede deshacer.`);

if(!confirmacion){
return;
}

// Primero eliminar registros de asistencia
const {error: errorAsistencia} = await supabaseClient
.from("asistencia")
.delete()
.eq("estudiante_id", id);

if(errorAsistencia){
alert("Error al eliminar registros de asistencia: " + errorAsistencia.message);
console.error(errorAsistencia);
return;
}

// Luego eliminar el estudiante
const {error} = await supabaseClient
.from("estudiantes")
.delete()
.eq("id", id);

if(error){
alert("Error al eliminar el estudiante: " + error.message);
console.error(error);
} else {
alert("Estudiante eliminado exitosamente");
// Recargar estudiantes
await cargar();
cerrarFormularioEstudiante();
mostrarEstudiantes();
}
}

function cerrarFormularioEstudiante(){
const contenedor = document.getElementById("contenedor-formulario-estudiante");
if(contenedor){
contenedor.innerHTML = "";
}
}

function cambiarModoTema(){
if(rolUsuario !== 'profesor'){
return;
}

const body = document.body;
const btnModo = document.getElementById("btn-modo-tema");

if(body.classList.contains('modo-noche')){
// Cambiar a modo día
body.classList.remove('modo-noche');
btnModo.innerHTML = "🌙 Modo Noche";
localStorage.setItem('modoTema', 'dia');
} else {
// Cambiar a modo noche
body.classList.add('modo-noche');
btnModo.innerHTML = "☀️ Modo Día";
localStorage.setItem('modoTema', 'noche');
}
}

// Cargar preferencia de tema al iniciar
document.addEventListener('DOMContentLoaded', function(){
const modoGuardado = localStorage.getItem('modoTema');
if(modoGuardado === 'noche' && rolUsuario === 'profesor'){
document.body.classList.add('modo-noche');
const btnModo = document.getElementById("btn-modo-tema");
if(btnModo){
btnModo.innerHTML = "☀️ Modo Día";
}
}
});

</script>
